<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0e1117" />
    <title>Remote Media Player</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M5 7.5A2.5 2.5 0 0 1 7.5 5h9A2.5 2.5 0 0 1 19 7.5v9a2.5 2.5 0 0 1-2.5 2.5h-9A2.5 2.5 0 0 1 5 16.5v-9Z"/><path d="m10 9 5 3-5 3V9Z"/></svg>
          </span>
          <div>
            <h1>Remote Media</h1>
            <p id="serverLabel">连接当前服务器</p>
          </div>
        </div>
        <button class="icon-button" id="settingsButton" type="button" aria-label="服务器设置" title="服务器设置">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z"/><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.88l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06A1.7 1.7 0 0 0 15 19.4a1.7 1.7 0 0 0-1 .6 1.7 1.7 0 0 0-.4 1.1V21a2 2 0 1 1-4 0v-.09A1.7 1.7 0 0 0 8.6 19.4a1.7 1.7 0 0 0-1.88.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-.6-1 1.7 1.7 0 0 0-1.1-.4H3a2 2 0 1 1 0-4h.09A1.7 1.7 0 0 0 4.6 8.6a1.7 1.7 0 0 0-.34-1.88l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.7 1.7 0 0 0 9 4.6a1.7 1.7 0 0 0 1-.6 1.7 1.7 0 0 0 .4-1.1V3a2 2 0 1 1 4 0v.09A1.7 1.7 0 0 0 15.4 4.6a1.7 1.7 0 0 0 1.88-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.7 1.7 0 0 0 19.4 9c.16.38.46.7.85.9.24.13.5.2.78.2H21a2 2 0 1 1 0 4h-.09a1.7 1.7 0 0 0-1.51.9Z"/></svg>
        </button>
      </header>

      <section class="connect-panel" id="connectPanel" hidden>
        <label for="serverInput">服务器地址</label>
        <div class="input-row">
          <input id="serverInput" inputmode="url" autocomplete="url" placeholder="例如 http://192.168.1.20:5178" />
          <button id="connectButton" type="button">连接</button>
        </div>
        <p>留空会使用当前页面所在服务器。连接另一台电脑时，填写它在局域网里的访问地址。</p>
      </section>

      <section class="library-panel">
        <div class="section-head">
          <div>
            <h2>媒体库</h2>
            <p id="libraryHint">选择一个服务端开放的文件夹</p>
          </div>
          <button class="ghost-button" id="refreshLibrariesButton" type="button">刷新</button>
        </div>
        <div class="library-tabs" id="libraryTabs" aria-label="媒体库列表"></div>
      </section>

      <nav class="pathbar" aria-label="文件路径">
        <button id="backButton" type="button" disabled>
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m15 18-6-6 6-6"/></svg>
          返回
        </button>
        <span id="pathLabel">/</span>
      </nav>

      <section class="content-panel">
        <div class="section-head">
          <div>
            <h2 id="folderTitle">文件</h2>
            <p id="countLabel">正在读取...</p>
          </div>
          <button class="ghost-button" id="refreshButton" type="button">刷新</button>
        </div>
        <div class="browser-list" id="browserList" aria-live="polite"></div>
      </section>
    </main>

    <aside class="player-dock" id="playerDock" hidden>
      <div class="now-playing">
        <span id="kindBadge">音频</span>
        <strong id="nowTitle">未选择文件</strong>
        <button class="icon-button small" id="playlistButton" type="button" aria-label="播放列表" title="播放列表">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>
        </button>
      </div>
      <audio id="audioPlayer" controls preload="metadata" hidden></audio>
      <video id="videoPlayer" controls playsinline preload="metadata" hidden></video>
      <div class="playlist" id="playlist" hidden></div>
    </aside>

    <dialog class="password-dialog" id="passwordDialog">
      <form method="dialog" id="passwordForm">
        <div class="dialog-head">
          <h2 id="passwordTitle">需要密码</h2>
          <button class="icon-button small" value="cancel" type="submit" aria-label="关闭" title="关闭">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12"/></svg>
          </button>
        </div>
        <p id="passwordHint">密码会在浏览器中加密后发送到服务端。</p>
        <label for="passwordInput">访问密码</label>
        <input id="passwordInput" type="password" autocomplete="current-password" />
        <button class="primary-button" id="unlockButton" type="submit" value="default">解锁</button>
      </form>
    </dialog>

    <script src="/js/app.js" type="module"></script>
  </body>
</html>
